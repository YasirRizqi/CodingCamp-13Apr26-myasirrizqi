<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <meta name="description" content="A mobile-friendly, modern expense and budget visualizer app.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <h1>Expense Visualizer</h1>
                <button id="theme-toggle" class="btn-theme-toggle" aria-label="Toggle Theme">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
            <div class="balance-card">
                <h2>Total Balance</h2>
                <div id="total-balance" class="balance-amount">$0.00</div>
                <div id="limit-warning" class="hidden"
                    style="color: #fee2e2; font-size: 0.9rem; margin-top: 0.5rem; font-weight: 600; text-align: center;">
                    ⚠️ Monthly Spending Limit Exceeded!
                </div>
            </div>
        </header>

        <main>
            <section class="chart-section glass-panel">
                <h3>Spending by Category</h3>
                <div class="chart-container">
                    <canvas id="expense-chart"></canvas>
                </div>
            </section>

            <section class="form-section glass-panel">
                <h3>Add Transaction</h3>
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="item-name">Item Name</label>
                        <input type="text" id="item-name" placeholder="e.g., Coffee" required>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" placeholder="e.g., 5.00" step="0.01" min="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="" disabled selected>Select a category</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Fun">Fun</option>
                            <option value="custom">-- Add Custom Category --</option>
                        </select>
                    </div>
                    <div class="form-group hidden" id="custom-category-group">
                        <label for="custom-category">New Category Name</label>
                        <input type="text" id="custom-category" placeholder="e.g., Shopping">
                    </div>
                    <button type="submit" class="btn-submit">Add Expense</button>
                </form>
            </section>

            <section class="settings-section glass-panel">
                <h3>Settings</h3>
                <div class="form-group">
                    <label for="spending-limit">Monthly Spending Limit</label>
                    <input type="number" id="spending-limit" placeholder="e.g., 500.00" step="0.01" min="0">
                </div>
            </section>

            <section class="list-section glass-panel">
                <h3>Transaction History</h3>
                <ul id="transaction-list" class="transaction-list">
                    <!-- Transactions will be dynamically added here -->
                </ul>
            </section>

            <section class="summary-section glass-panel">
                <h3>Monthly Summary</h3>
                <div id="monthly-summary-container" class="monthly-summary-container">
                    <!-- Monthly summaries will be dynamically added here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Chart.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Main Script -->
    <script src="js/script.js"></script>
</body>

</html>
